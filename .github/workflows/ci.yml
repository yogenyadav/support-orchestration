name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Core + dev only — the PoC runs fully mocked; prod drivers (oracledb,
      # pyodbc, paramiko, asyncpg) are an optional extra with lazy imports.
      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy strict)
        run: mypy support_orchestration evals

      - name: Unit tests
        run: pytest tests/ -q

      - name: Eval harness — triage regression gate
        run: python -m evals

      - name: Eval harness — fixture adapter wiring
        run: python -m evals --validate-fixtures
