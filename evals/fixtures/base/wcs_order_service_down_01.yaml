# Eval fixture — synthetic example (not a real incident).

fixture_id: "wcs_order_service_down_01"
grounding: "[SYNTHETIC — from skills/wcs-diagnosis/SKILL.md wcs_service_down scenario]"

# ── Input ────────────────────────────────────────────────────────────────────
input:
  jira_ticket_id: "WH-EXAMPLE-402"
  client: "example-client"
  priority: "P1"
  description: "Order 44002 stuck in on_takeaway state for 2 hours. Tote is physically on the conveyor but WCS hasn't moved it forward. Multiple other totes also appear to be stuck on the takeaway conveyor."
  entity_type: "order"
  entity_id: "44002"
  entity_current_state: "on_takeaway"

# ── Ground truth ──────────────────────────────────────────────────────────────
ground_truth:
  owning_domain: "WCS"
  stuck_transition: "on_takeaway → sorted"
  root_cause: "The WCS Windows service crashed 2 hours ago due to an unhandled exception. The service has not auto-restarted. Totes are physically on the conveyor but WCS is not processing sorter/divert instructions or tracking movement."
  blocker_class: "wcs_service_down"
  fix_applied: "Confirmed WCS Windows service was stopped (Windows Event Log showed crash dump). Restarted the service via PowerShell remote: Restart-Service WCSRoutingService. Service came up and began processing queued totes within 90 seconds. Also verified MS SQL connectivity was intact after restart."
  fix_sql: null

# ── Scoring ───────────────────────────────────────────────────────────────────
scoring:
  triage_correct_if:
    owning_domain: "WCS"
  diagnosis_correct_if:
    stuck_transition: "on_takeaway → sorted"
    blocker_class: "wcs_service_down"
  fix_match_if:
    proposed_fix_must_mention: ["WCS", "Windows service", "restart"]

